services:
  - type: web
    name: itesho-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python render_migrate.py
    startCommand: gunicorn itesho.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iteshodb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
