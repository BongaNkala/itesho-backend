services:
  - type: web
    name: itesho-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn itesho.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iteshodb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com,itesho-backend.onrender.com,localhost
      - key: PYTHON_VERSION
        value: 3.11.5
